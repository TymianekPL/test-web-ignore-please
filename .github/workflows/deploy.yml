- name: Setup SSH
  env:
    DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    DEPLOY_PASSPHRASE: ${{ secrets.DEPLOY_PASSPHRASE }}
  run: |
    mkdir -p ~/.ssh

    echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
    chmod 600 ~/.ssh/id_deploy

    eval "$(ssh-agent -s)"

    cat > ~/.ssh/askpass.sh << 'EOF'
    #!/bin/sh
    echo "$DEPLOY_PASSPHRASE"
    EOF

    chmod +x ~/.ssh/askpass.sh

    export SSH_ASKPASS=~/.ssh/askpass.sh
    export DISPLAY=:0

    setsid ssh-add ~/.ssh/id_deploy < /dev/null

- name: Add known_hosts
  env:
    DEPLOY_ADDRESS: ${{ secrets.DEPLOY_ADDRESS }}
  run: |
    ssh-keyscan -H "$DEPLOY_ADDRESS" >> ~/.ssh/known_hosts

- name: Deploy
  env:
    DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    DEPLOY_ADDRESS: ${{ secrets.DEPLOY_ADDRESS }}
  run: |
    rsync -avz --delete \
      -e "ssh -o StrictHostKeyChecking=yes" \
      ./ $DEPLOY_USER@$DEPLOY_ADDRESS:/var/www/html/
