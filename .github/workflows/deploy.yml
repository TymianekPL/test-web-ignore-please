name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent and load key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          ssh-passphrase: ${{ secrets.DEPLOY_PASSPHRASE }}

      - name: Add host to known_hosts
        env:
          DEPLOY_ADDRESS: ${{ secrets.DEPLOY_ADDRESS }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_ADDRESS" >> ~/.ssh/known_hosts

      - name: Test SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ADDRESS: ${{ secrets.DEPLOY_ADDRESS }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
            $DEPLOY_USER@$DEPLOY_ADDRESS \
            "echo connected"

      - name: Deploy files
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ADDRESS: ${{ secrets.DEPLOY_ADDRESS }}
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=yes" \
            ./ $DEPLOY_USER@$DEPLOY_ADDRESS:/var/www/html/
